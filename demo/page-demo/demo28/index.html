<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>无限滚动面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; height: 100%; }
    body { background: #0a0a0a; }
    
    .container {
      height: 100%;
      overflow: hidden;
      position: relative;
    }
    
    .panels-wrapper {
      display: flex;
      flex-direction: column;
      transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
    }
    
    .panel {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .panel::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      filter: blur(100px);
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }

    .panel:nth-child(odd)::before { top: -150px; right: -150px; }
    .panel:nth-child(even)::before { bottom: -150px; left: -150px; animation-delay: -4s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .panel:nth-child(1) { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .panel:nth-child(2) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .panel:nth-child(3) { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .panel:nth-child(4) { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
    .panel:nth-child(5) { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }

    .panel-content {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .panel-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      display: block;
    }

    .panel h1 {
      font-size: 3.5rem;
      color: white;
      margin-bottom: 12px;
      text-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .panel p {
      font-size: 1.4rem;
      color: rgba(255, 255, 255, 0.85);
    }

    /* 导航点 */
    .nav-dots {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .nav-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid transparent;
    }

    .nav-dot:hover { background: rgba(255, 255, 255, 0.5); transform: scale(1.2); }
    .nav-dot.active { background: white; transform: scale(1.3); box-shadow: 0 0 25px rgba(255, 255, 255, 0.6); }

    /* 进度条 */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #fff, rgba(255,255,255,0.5));
      z-index: 1001;
      width: 0%;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
      transition: width 0.1s;
    }

    /* 页码指示器 */
    .page-indicator {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 1rem;
      font-weight: 500;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      padding: 8px 20px;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .page-indicator .current { font-size: 1.2rem; font-weight: 700; }
    .page-indicator .total { opacity: 0.5; }

    /* 粒子背景 */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      animation: float 20s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="progress-bar" id="progressBar"></div>
  <nav class="nav-dots" id="navDots"></nav>
  <div class="page-indicator" id="pageIndicator">
    <span class="current">1</span><span class="total"> / 5</span>
  </div>

  <div class="container">
    <div class="panels-wrapper" id="panelsWrapper">
      <section class="panel"><div class="panel-content"><span class="panel-icon">🚀</span><h1>第一页</h1><p>欢迎来到无限滚动世界</p></div></section>
      <section class="panel"><div class="panel-content"><span class="panel-icon">🎨</span><h1>第二页</h1><p>体验流畅的滚动动画</p></div></section>
      <section class="panel"><div class="panel-content"><span class="panel-icon">⚡</span><h1>第三页</h1><p>GSAP 强力驱动</p></div></section>
      <section class="panel"><div class="panel-content"><span class="panel-icon">🌟</span><h1>第四页</h1><p>丝滑的吸附效果</p></div></section>
      <section class="panel"><div class="panel-content"><span class="panel-icon">💫</span><h1>第五页</h1><p>无限循环滚动</p></div></section>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const totalPanels = 5;
    let currentIndex = 0;
    const wrapper = document.getElementById('panelsWrapper');
    const panels = document.querySelectorAll('.panel');

    // 创建粒子
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 20 + 's';
      p.style.animationDuration = (15 + Math.random() * 10) + 's';
      document.getElementById('particles').appendChild(p);
    }

    // 创建导航点
    const navDots = document.getElementById('navDots');
    for (let i = 0; i < totalPanels; i++) {
      const dot = document.createElement('button');
      dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goToPanel(i));
      navDots.appendChild(dot);
    }

    // 更新UI
    function updateUI(index) {
      document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
      });
      document.querySelector('.page-indicator .current').textContent = index + 1;
      document.getElementById('progressBar').style.width = ((index + 1) / totalPanels * 100) + '%';
    }

    // 跳转到面板
    function goToPanel(index) {
      const tweens = gsap.getTweensOf(wrapper);
      if (tweens.length > 0 && tweens[0].isActive()) return;
      
      if (index < 0) index = totalPanels - 1;
      if (index >= totalPanels) index = 0;
      
      currentIndex = index;
      updateUI(index);
      
      gsap.to(wrapper, {
        y: -index * window.innerHeight,
        duration: 0.35,
        ease: 'power2.inOut'
      });
    }

    // 初始化显示
    updateUI(0);

    // 鼠标滚轮控制
    let wheelDelta = 0;
    let wheelTimeout;
    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      
      const tweens = gsap.getTweensOf(wrapper);
      if (tweens.length > 0 && tweens[0].isActive()) return;
      
      wheelDelta += e.deltaY;
      
      clearTimeout(wheelTimeout);
      wheelTimeout = setTimeout(() => {
        if (wheelDelta > 0) {
          goToPanel(currentIndex + 1);
        } else {
          goToPanel(currentIndex - 1);
        }
        wheelDelta = 0;
      }, 50);
    }, { passive: false });

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'PageDown') {
        e.preventDefault();
        goToPanel(currentIndex + 1);
      } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
        e.preventDefault();
        goToPanel(currentIndex - 1);
      } else if (e.key === 'Home') {
        e.preventDefault();
        goToPanel(0);
      } else if (e.key === 'End') {
        e.preventDefault();
        goToPanel(totalPanels - 1);
      }
    });

    // 触摸滑动
    let touchStartY = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const diff = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(diff) > 50) {
        if (diff > 0) {
          goToPanel(currentIndex + 1);
        } else {
          goToPanel(currentIndex - 1);
        }
      }
    }, { passive: true });
  </script>
</body>
</html>
